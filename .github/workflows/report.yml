name: Generate FX report

on:
  # 10:00 Києва = 7:00 UTC
  schedule:
    - cron: '0 7 * * 1-5'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Встановити залежності
        run: pip install -r requirements.txt

      - name: Згенерувати звіт
        run: python main.py report

      - name: Закомітити звіт
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add last-report.txt
          if git diff --staged --quiet; then
            echo "Звіт не змінився"
          else
            git commit -m "Auto: щоденний звіт $(date -u '+%Y-%m-%d')"
            git push
          fi
